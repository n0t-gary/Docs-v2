Name: InsertService
Description: Insert is a class used for inserting user-generated models into
  your game via scripts.
Category: services
BaseType: Instance
Properties: []
Methods:
  - Name: DefaultNPC
    ReturnType: NPC
    Parameters: []
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Inserts a Default NPC
  - Name: InitializeDefaultNPC
    ReturnType: nil
    Parameters:
      - Name: npc
        Type: NPC
        IsOptional: false
        DefaultValue: ""
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Initialize default NPC with the DefaultCharacter and sounds
  - Name: DefaultCharacter
    ReturnType: PolytorianModel
    Parameters: []
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Inserts a Default PolytorianModel
  - Name: ModelAsync
    ReturnType: Instance
    Parameters:
      - Name: id
        Type: number
        IsOptional: false
        DefaultValue: ""
    IsAsync: true
    IsObsolete: false
    IsStatic: false
    Description: Inserts a model with the specified ID.
  - Name: AccessoryAsync
    ReturnType: Accessory
    Parameters:
      - Name: id
        Type: number
        IsOptional: false
        DefaultValue: ""
    IsAsync: true
    IsObsolete: false
    IsStatic: false
    Description: Inserts an accessory with the specified ID.
  - Name: ToolAsync
    ReturnType: Tool
    Parameters:
      - Name: id
        Type: number
        IsOptional: false
        DefaultValue: ""
    IsAsync: true
    IsObsolete: false
    IsStatic: false
    Description: Insert a new tool with the specified ID
Events: []
IsStatic: true
IsAbstract: false
IsInstantiable: false
StaticAlias: Insert
