Name: Team
Description: Team is an object that represents a player team to which players
  can be assigned.
Category: game
BaseType: Instance
Properties:
  - Name: DisplayName
    Type: string
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: Display name for this team
  - Name: Color
    Type: Color
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: Color for this team
Methods:
  - Name: GetDisplayName
    ReturnType: string
    Parameters: []
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Returns the display name of the team. If DisplayName is specified,
      it returns DisplayName; otherwise, it returns Name.
  - Name: GetPlayers
    ReturnType: "{ Player }"
    Parameters: []
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Get all players assigned to this team.
Events: []
IsStatic: false
IsAbstract: false
IsInstantiable: true
StaticAlias: null
