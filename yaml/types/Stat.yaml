Name: Stat
Description: Stat is an object that represents a player stat to which players
  can be assigned to have their own number or string values.
Category: game
BaseType: Instance
Properties:
  - Name: DisplayName
    Type: string
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: The display name for this stat.
Methods:
  - Name: GetDisplayName
    ReturnType: string
    Parameters: []
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Returns the display name of the stat. If DisplayName is specified,
      it returns DisplayName; otherwise, it returns Name.
  - Name: Set
    ReturnType: nil
    Parameters:
      - Name: player
        Type: Player
        IsOptional: false
        DefaultValue: ""
      - Name: val
        Type: number
        IsOptional: false
        DefaultValue: ""
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Set the value stat of player to string
  - Name: Set
    ReturnType: nil
    Parameters:
      - Name: player
        Type: Player
        IsOptional: false
        DefaultValue: ""
      - Name: val
        Type: string
        IsOptional: false
        DefaultValue: ""
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Set the value stat of player to string
  - Name: Get
    ReturnType: any
    Parameters:
      - Name: player
        Type: Player
        IsOptional: false
        DefaultValue: ""
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Get the value stat of player
  - Name: GetTotalForTeam
    ReturnType: number
    Parameters:
      - Name: team
        Type: Team
        IsOptional: false
        DefaultValue: ""
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Get the total value for team
  - Name: GetDisplayValue
    ReturnType: string
    Parameters:
      - Name: plr
        Type: Player
        IsOptional: false
        DefaultValue: ""
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Gets the display value for a player. If the value is a number, it
      is automatically converted to K/M/S format (e.g., 1K+, 12.3K+).
Events: []
IsStatic: false
IsAbstract: false
IsInstantiable: true
StaticAlias: null
