Name: PolytorianModel
Description: PolytorianModel is a CharacterModel that represent default Polytoria Character.
Category: world
BaseType: CharacterModel
Properties:
  - Name: HeadColor
    Type: Color
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: The head color
  - Name: TorsoColor
    Type: Color
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: The torso color
  - Name: LeftArmColor
    Type: Color
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: The left arm color
  - Name: RightArmColor
    Type: Color
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: The right arm color
  - Name: LeftLegColor
    Type: Color
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: The left leg color
  - Name: RightLegColor
    Type: Color
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: The right leg color
  - Name: FaceImage
    Type: ImageAsset
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: The face image to use
  - Name: BodyMesh
    Type: MeshAsset
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: The body mesh to use, the mesh must be in Polytoria Body rig format.
  - Name: Ragdolling
    Type: boolean
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
    Description: Returns true if this character is ragdolling
  - Name: RagdollPosition
    Type: Vector3
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
    Description: Returns the current global ragdoll position, if ragdoll haven't
      starts yet. Returns `Vector3.Zero`
  - Name: RagdollRotation
    Type: Vector3
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
    Description: Returns the current global ragdoll rotation, if ragdoll haven't
      starts yet. Returns `Vector3.Zero`
Methods:
  - Name: StartRagdoll
    ReturnType: nil
    Parameters:
      - Name: force
        Type: Vector3
        IsOptional: true
        DefaultValue: null
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Start ragdoll
  - Name: StopRagdoll
    ReturnType: nil
    Parameters: []
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Stop ragdoll
  - Name: GetAttachment
    ReturnType: Dynamic
    Parameters:
      - Name: attachmentEnum
        Type: CharacterAttachmentEnum
        IsOptional: false
        DefaultValue: ""
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Get an attachment from this character.
  - Name: LoadAppearance
    ReturnType: nil
    Parameters:
      - Name: userID
        Type: number
        IsOptional: false
        DefaultValue: ""
      - Name: loadTool
        Type: boolean
        IsOptional: true
        DefaultValue: "True"
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Load an appearance.
  - Name: ClearAppearance
    ReturnType: nil
    Parameters: []
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    Description: Clear current appearance.
Events:
  - Name: RagdollStarted
    Parameters: null
    Description: Fires when ragdoll has been started
    Arguments: ""
  - Name: RagdollStopped
    Parameters: null
    Description: Fires when ragdoll has been stopped
    Arguments: ""
IsStatic: false
IsAbstract: false
IsInstantiable: true
StaticAlias: null
