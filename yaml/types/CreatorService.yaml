Name: CreatorService
Description: CreatorService is the class that manages the creator. This class is
  only available in the creator.
Category: services
BaseType: null
Properties:
  - Name: Interface
    Type: CreatorInterface
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: true
    Description: The interface
  - Name: CurrentGame
    Type: World
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: true
    Description: Current active game
  - Name: LocalTestActive
    Type: boolean
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
