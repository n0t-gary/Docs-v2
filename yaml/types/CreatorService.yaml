    Parameters: null
    Description: Fires when local testing starts
    Arguments: ""
  - Name: LocalTestStopped
    Parameters: null
    Description: Fires when local testing ends
    Arguments: ""
IsStatic: true
IsAbstract: false
IsInstantiable: false
StaticAlias: Creator
